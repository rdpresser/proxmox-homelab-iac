# =====================================================
# Prometheus Configuration
# =====================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'local'
    environment: 'local'

scrape_configs:
  # OpenTelemetry Collector — app metrics forwarded from OTLP
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: 'otel-collector'

  # Tempo metrics_generator — enables Service Map and Rate queries in Grafana
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
        labels:
          service: 'tempo'
    metrics_path: '/metrics'

  # ---- ADD YOUR SERVICES BELOW ----
  # Example: scrape a service's /metrics endpoint directly
  # - job_name: 'my-service'
  #   static_configs:
  #     - targets: ['my-service:8080']
  #       labels:
  #         service: 'my-service'
  #   metrics_path: '/metrics'
